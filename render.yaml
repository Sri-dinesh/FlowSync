services:
  - type: web
    name: flowsync-server
    runtime: python
    buildCommand: >-
      pip install --upgrade pip &&
      pip install torch==2.3.1+cpu --extra-index-url https://download.pytorch.org/whl/cpu &&
      pip install -r server/requirements.txt
    startCommand: bash -c "cd server && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
