name: Keep Backend Alive

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch: 

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Keep-Alive API
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "::error::APP_URL secret is not set. Please add it to your GitHub Repository Secrets (e.g., https://your-frontend.vercel.app)"
            exit 1
          fi
          
          # Remove trailing slash from APP_URL if present to avoid double slashes
          CLEAN_URL=$(echo "${{ secrets.APP_URL }}" | sed 's:/*$::')
          
          echo "Pinging $CLEAN_URL/api/keep-alive..."
          # Use -L to follow redirects (common for HTTP -> HTTPS or URL normalization)
          RESPONSE=$(curl -sL -w "\n%{http_code}" "$CLEAN_URL/api/keep-alive")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "Status: $HTTP_STATUS"
          echo "Body: $BODY"
          
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Successfully pinged backend via frontend."
          else
            echo "::warning::Ping failed with status $HTTP_STATUS"
            exit 1
          fi
